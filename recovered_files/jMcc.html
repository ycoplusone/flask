{% extends "base.html" %}

{% block content %}
<div class="container py-4" style="max-width:420px; margin:auto;">
  <h2 class="mb-3">기기 인증 로그인</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="message-box">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post" style="display:flex; flex-direction:column; gap:12px;" action="/login">
    <input type="text" name="username" placeholder="아이디(이름)" required class="form-control">
    <input type="password" name="password" placeholder="비밀번호(사랑이란 숫자)" required class="form-control">
    <button type="submit" class="btn-done">이 기기 인증하고 로그인</button>
  </form>

  <p style="margin-top:12px; font-size:14px;"><a href="/">취소</a></p>
</div>
{% endblock %}
