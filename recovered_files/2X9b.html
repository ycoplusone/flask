<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 목록</title>
</head>
<body>
    <h1>사용자 목록</h1>
    <ul>
        {% for user in users %}
            <li>
                <strong>ID:</strong> {{ user.id }}, 
                <strong>Name:</strong> {{ user.name }}
            </li>
        {% else %}
            <li>사용자가 없습니다.</li>
        {% endfor %}
    </ul>
</body>
</html>
