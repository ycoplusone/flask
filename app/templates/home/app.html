{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
	<div class="row mb-3">
		<div class="col-12">
			<h2>대시보드</h2>
		</div>
	</div>

	<div class="row mb-4">
		<div class="col-md-4">
			<div class="card">
				<div class="card-body">
					<h5 class="card-title">잔여 수집 데이터 건수 (최근 10일)</h5>
					<p class="card-text" style="font-size:32px; font-weight:600;">{{ remaining_count }}</p>
				</div>
			</div>
		</div>
		<div class="col-md-8">
			<div class="card">
				<div class="card-body">
					<h5 class="card-title">최근 7일 작업 일별 건수!!!</h5>
					{% if week_counts %}
					<div style="overflow:auto">
						<table class="table table-sm">
							<thead>
								<tr>
									<th>일자</th>
									<th>건수</th>
								</tr>
							</thead>
							<tbody>
								{% for r in week_counts %}
								<tr>
									<td>{{ r.d }}</td>
									<td>{{ r.cnt }}</td>
								</tr>
								{% endfor %}
							</tbody>
						</table>
					</div>
					{% else %}
						<p>데이터가 없습니다.</p>
					{% endif %}
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
